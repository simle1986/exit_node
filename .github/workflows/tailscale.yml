name: exit node
on:
  workflow_dispatch:

jobs:
  tailscale:
    runs-on: ubuntu-latest
    timeout-minutes: 3600

    steps:
      - name: 安装 Tailscale
        run: |
          curl -fsSL https://tailscale.com/install.sh | sh

      - name: 开启 IP 转发
        run: |
          sudo sysctl -w net.ipv4.ip_forward=1
          sudo sysctl -w net.ipv6.conf.all.forwarding=1

      - name: 启动 Tailscale 免登录
        run: |
          sudo tailscale up \
            --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} \
            --hostname=gh-linux-node \
            --advertise-exit-node \
            --accept-routes \
            --reset

          TS_IP=$(sudo tailscale ip -4)
          echo "✅ 节点上线成功：$TS_IP"
          echo "✅ 出口节点已开启"

      - name: 保持运行
        run: sleep infinity
